<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — АгроРеестр AI</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --border: #374151;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #10b981;
      --accent-hover: #059669;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background: var(--bg); color: var(--text); }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: .2px; margin-bottom: 4px; }
    .logo span { color: var(--accent); }
    .muted { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .form { display: flex; gap: 10px; flex-wrap: wrap; }
    input { flex: 1; min-width: 220px; background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 10px 12px; border-radius: 10px; font-size: 15px; outline: none; }
    .btn { padding: 10px 14px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }
    .btn:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #dc2626; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
    th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 12px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; background: rgba(16,185,129,.15); color: var(--accent); font-size: 12px; font-weight: 600; }
    .error { color: var(--danger); margin-top: 8px; font-size: 14px; }
    .back { color: var(--accent); text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <a class="back" href="/">← На главную</a>
      <div class="logo" style="margin-top:10px;">Агро<span>Реестр</span> AI</div>
      <div class="muted">Управление доступом к AI помощнику</div>

      <div v-if="!isAdmin" class="card" style="text-align:center;"
        >
        <p>У вас нет доступа к этой странице.</p>
        <a href="/">Вернуться на главную</a>
      </div>

      <template v-else>
        <div class="card">
          <h3 style="margin:0 0 10px;"
            >Добавить пользователя</h3>
          <div class="form"
            >
            <input v-model="newEmail" placeholder="email@example.com" @keydown.enter="addUser" />
            <button class="btn" @click="addUser" :disabled="adding"
              >{{ adding ? 'Добавление...' : 'Добавить' }}</button>
          </div>
          <div v-if="message" style="margin-top:10px;color:var(--accent);font-size:14px;"
            >{{ message }}</div>
          <div v-if="error" class="error"
            >{{ error }}</div>
        </div>

        <div class="card">
          <h3 style="margin:0 0 6px;"
            >Белый список</h3>
          <p style="color:var(--muted);font-size:13px;margin:0 0 10px;"
            >{{ users.length }} пользователей</p>
          <div class="table-wrap"
            >
            <table>
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Роль</th>
                  <th>Кем выдан</th>
                  <th>Дата</th>
                  <th style="width:90px;"
                    ></th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="u in users" :key="u.email">
                  <td>{{ u.email }}</td>
                  <td>
                    <span v-if="u.is_admin" class="badge">Админ</span>
                    <span v-else style="color:var(--muted);"
                      >Пользователь</span>
                  </td>
                  <td style="color:var(--muted);"
                    >{{ u.granted_by || '-' }}</td>
                  <td style="color:var(--muted);"
                    >{{ formatDate(u.created_at) }}</td>
                  <td>
                    <button v-if="!u.is_admin" class="btn btn-danger" style="padding:6px 10px;font-size:12px;" @click="removeUser(u.email)"
                      >Удалить</button>
                    <span v-else style="color:var(--muted);font-size:12px;"
                      >—</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          isAdmin: false,
          users: [],
          newEmail: '',
          adding: false,
          message: '',
          error: ''
        };
      },
      methods: {
        async load() {
          try {
            const r = await fetch('/admin/users');
            if (r.status === 403) { this.isAdmin = false; return; }
            const d = await r.json();
            this.users = d.users || [];
            this.isAdmin = true;
          } catch (e) {
            this.error = 'Ошибка загрузки данных';
          }
        },
        async addUser() {
          this.error = '';
          this.message = '';
          if (!this.newEmail.trim() || !this.newEmail.includes('@')) {
            this.error = 'Введите корректный email';
            return;
          }
          this.adding = true;
          try {
            const r = await fetch('/admin/users', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.newEmail.trim() })
            });
            if (r.status === 403) { this.isAdmin = false; return; }
            if (!r.ok) {
              const d = await r.json();
              this.error = d.detail || 'Ошибка';
            } else {
              this.message = 'Пользователь добавлен';
              this.newEmail = '';
              await this.load();
            }
          } catch (e) {
            this.error = 'Ошибка соединения';
          }
          this.adding = false;
        },
        async removeUser(email) {
          if (!confirm('Удалить ' + email + '?')) return;
          try {
            const r = await fetch('/admin/users/' + encodeURIComponent(email), { method: 'DELETE' });
            if (r.status === 403) { this.isAdmin = false; return; }
            await this.load();
          } catch (e) {
            this.error = 'Ошибка удаления';
          }
        },
        formatDate(ts) {
          if (!ts) return '-';
          const d = new Date(ts);
          return isNaN(d) ? ts : d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
      },
      mounted() {
        this.load();
      }
    }).mount('#app');
  </script>
</body>
</html>
